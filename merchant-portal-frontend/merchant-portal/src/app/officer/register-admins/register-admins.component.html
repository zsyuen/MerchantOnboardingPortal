<div class="reg-container">
  <div class="reg-back-row">
    <a routerLink="/officer/manage-admins" class="btn reg-back-btn">← Back</a>
  </div>

  <div class="form-card">
    <h3 class="mb-4">Admin Registration</h3>

    <form [formGroup]="form" (ngSubmit)="onSubmit()">

      <div class="reg-field">
        <label for="username" class="form-label">Username</label>
        <div class="reg-input-wrap">
          <input type="text" class="form-control" id="username" formControlName="username"
            [ngClass]="{'is-invalid': form.get('username')?.touched && form.get('username')?.errors?.['required']}">
          <div *ngIf="form.get('username')?.touched && form.get('username')?.errors?.['required']" class="invalid-feedback">
            Please fill out this field.
          </div>
        </div>
      </div>

      <div class="reg-field">
        <label for="email" class="form-label">Email</label>
        <div class="reg-input-wrap">
          <input type="email" class="form-control" id="email" formControlName="email"
            [ngClass]="{'is-invalid': form.get('email')?.touched && (form.get('email')?.errors?.['required'] || form.get('email')?.errors?.['email'])}">
          <div *ngIf="form.get('email')?.touched && form.get('email')?.errors?.['required']" class="invalid-feedback">
            Please fill out this field.
          </div>
          <div *ngIf="form.get('email')?.touched && form.get('email')?.errors?.['email']" class="invalid-feedback">
            Please enter a valid email.
          </div>
        </div>
      </div>

      <div class="reg-field">
        <label for="password" class="form-label">Password</label>
        <div class="reg-input-wrap">
          <input type="password" class="form-control" id="password" formControlName="password"
            [ngClass]="{'is-invalid': form.get('password')?.touched && form.get('password')?.errors?.['required']}">
          <div *ngIf="form.get('password')?.touched && form.get('password')?.errors?.['required']" class="invalid-feedback">
            Please fill out this field.
          </div>
        </div>
      </div>

      <div class="reg-field">
        <label for="confirmPassword" class="form-label">Confirm Password</label>
        <div class="reg-input-wrap">
          <input type="password" class="form-control" id="confirmPassword" formControlName="confirmPassword"
            [ngClass]="{'is-invalid': (form.get('confirmPassword')?.touched && form.get('confirmPassword')?.errors?.['required']) || (form.get('confirmPassword')?.touched && form.errors?.['mismatch'])}">
          <div *ngIf="form.get('confirmPassword')?.touched && form.get('confirmPassword')?.errors?.['required']" class="invalid-feedback">
            Please fill out this field.
          </div>
          <div *ngIf="form.get('confirmPassword')?.touched && !form.get('confirmPassword')?.errors?.['required'] && form.errors?.['mismatch']" class="invalid-feedback">
            Passwords do not match.
          </div>
        </div>
      </div>

      <div class="reg-btn-row">
        <button type="submit" class="btn btn-primary reg-btn" [disabled]="form.invalid">Register</button>
      </div>

    </form>
  </div>
</div>
