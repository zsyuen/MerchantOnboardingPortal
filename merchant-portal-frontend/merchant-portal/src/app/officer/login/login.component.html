<div class="login-container">
    <div class="form-card" [ngSwitch]="loginStep">
        
        <div *ngSwitchCase="'CREDENTIALS'">
            <h3 class="mb-4 text-center">Officer Login</h3>
            <form [formGroup]="loginForm" (ngSubmit)="onLogin()">
                <div class="mb-3">
                    <label for="username" class="form-label">Username</label>
                    <input type="text" id="username" class="form-control" formControlName="username">
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" id="password" class="form-control" formControlName="password">
                </div>
                <div *ngIf="errorMsg" class="alert alert-danger">
                    {{ errorMsg }}
                </div>
                <div class="d-grid">
                    <button type="submit" class="btn btn-primary" [disabled]="loginForm.invalid || submitting">
                        <span *ngIf="!submitting">Login</span>
                        <span *ngIf="submitting">Logging in...</span>
                    </button>
                </div>
            </form>
        </div>

        <div *ngSwitchCase="'TOTP_SETUP'" class="text-center">
            <h3 class="mb-3">Setup 2FA</h3>
            <p class="text-muted small">
                Scan this QR code with your Google Authenticator app.
            </p>
            
            <div class="my-3 d-flex justify-content-center">
                <canvas #qrCanvas class="border rounded"></canvas>
            </div>

            <div class="alert alert-info py-2 small mb-3">
                <strong>Secret:</strong> {{ secretKey }}
            </div>

            <form [formGroup]="totpForm" (ngSubmit)="onVerifyTotp()">
                <div class="mb-3">
                    <label class="form-label">Enter the 6-digit code generated</label>
                    <input 
                        type="text" 
                        class="form-control text-center totp-input mx-auto" 
                        style="max-width: 200px;"
                        formControlName="totpCode"
                        maxlength="6"
                        placeholder="000 000">
                </div>
                <div *ngIf="errorMsg" class="alert alert-danger">
                    {{ errorMsg }}
                </div>
                <div class="d-grid">
                    <button type="submit" class="btn btn-success" [disabled]="totpForm.invalid || submitting">
                        Activate Account
                    </button>
                </div>
            </form>
        </div>

        <div *ngSwitchCase="'TOTP_VERIFY'">
            <h3 class="mb-4 text-center">Security Check</h3>
            <p class="text-center text-muted mb-4">
                Enter the 6-digit code from your app
            </p>
            <form [formGroup]="totpForm" (ngSubmit)="onVerifyTotp()">
                <div class="mb-3">
                    <label for="totpCode" class="form-label">Verification Code</label>
                    <input 
                        type="text" 
                        id="totpCode" 
                        class="form-control text-center totp-input" 
                        formControlName="totpCode"
                        placeholder="000000"
                        maxlength="6"
                        autocomplete="off">
                    <div *ngIf="totpForm.get('totpCode')?.invalid && totpForm.get('totpCode')?.touched" 
                         class="text-danger small mt-1">
                        Please enter a 6-digit code
                    </div>
                </div>
                <div *ngIf="errorMsg" class="alert alert-danger">
                    {{ errorMsg }}
                </div>
                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-primary" [disabled]="totpForm.invalid || submitting">
                        <span *ngIf="!submitting">Verify</span>
                        <span *ngIf="submitting">Verifying...</span>
                    </button>
                    <button type="button" class="btn btn-outline-secondary" (click)="goBack()" [disabled]="submitting">
                        Back to Login
                    </button>
                </div>
            </form>
        </div>

    </div>
</div>
