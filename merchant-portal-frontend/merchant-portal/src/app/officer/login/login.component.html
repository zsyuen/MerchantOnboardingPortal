<div class="login-container">
    <div class="form-card" [ngSwitch]="loginStep">
        
        <div *ngSwitchCase="'CREDENTIALS'">
            <h3 class="mb-4 text-center">Officer Login</h3>
            <div *ngIf="revokedMsg" class="alert alert-warning d-flex align-items-center" role="alert">
            </div>
            <form [formGroup]="loginForm" (ngSubmit)="onLogin()">
                <div class="login-field mb-4">
                    <label for="username" class="form-label">Username</label>
                    <input type="text" id="username" class="form-control" formControlName="username">
                </div>
                <div class="login-field mb-4">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" id="password" class="form-control" formControlName="password">
                </div>
                <div class="login-btn-wrap mt-4">
                    <button type="submit" class="btn btn-primary login-btn" [disabled]="loginForm.invalid || submitting">
                        <span *ngIf="!submitting">Login</span>
                        <span *ngIf="submitting">Logging in...</span>
                    </button>
                </div>
            </form>
        </div>

        <div *ngSwitchCase="'TOTP_SETUP'" class="text-center">
            <h3 class="mb-3">Setup 2FA</h3>
            <p class="text-muted small text-center">
                Scan this QR code with your Google Authenticator app.
            </p>
            
            <div class="totp-qr-wrap">
                <canvas #qrCanvas class="border rounded"></canvas>
            </div>

            <div class="totp-secret-box">
                <strong>Secret:</strong> {{ secretKey }}
            </div>

            <form [formGroup]="totpForm" (ngSubmit)="onVerifyTotp()">
                <div class="totp-code-field">
                    <label class="form-label totp-code-label">Enter the 6-digit code generated</label>
                    <input 
                        type="text" 
                        class="form-control text-center totp-input" 
                        formControlName="totpCode"
                        maxlength="6"
                        placeholder="000 000">
                </div>
                <div class="totp-btn-wrap">
                    <button type="submit" class="btn btn-primary totp-activate-btn" [disabled]="totpForm.invalid || submitting">
                        Activate Account
                    </button>
                </div>
            </form>
        </div>

        <div *ngSwitchCase="'TOTP_VERIFY'">
            <h3 class="mb-4 text-center">Two-Factor Authentication</h3>
            <p class="text-center text-muted mb-4">
                Enter the 6-digit code from your app
            </p>
            <form [formGroup]="totpForm" (ngSubmit)="onVerifyTotp()">
                <div class="mb-3">
                    <input 
                        type="text" 
                        id="totpCode" 
                        class="form-control text-center totp-input" 
                        [ngClass]="{'is-invalid': totpForm.get('totpCode')?.invalid && totpForm.get('totpCode')?.touched}"
                        formControlName="totpCode"
                        placeholder="000000"
                        maxlength="6"
                        autocomplete="off">
                    <div *ngIf="totpForm.get('totpCode')?.invalid && totpForm.get('totpCode')?.touched" 
                         class="invalid-feedback">
                        Please enter a 6-digit verification code.
                    </div>
                </div>
                <div *ngIf="errorMsg" class="alert alert-danger">
                    {{ errorMsg }}
                </div>
                <div class="verify-btn-row">
                    <button type="submit" class="btn btn-primary verify-btn" [disabled]="totpForm.invalid || submitting">
                        <span *ngIf="!submitting">Verify</span>
                        <span *ngIf="submitting">Verifying...</span>
                    </button>
                    <button type="button" class="btn btn-outline-secondary verify-btn" (click)="goBack()" [disabled]="submitting">
                        Back to Login
                    </button>
                </div>
            </form>
        </div>

    </div>
</div>
