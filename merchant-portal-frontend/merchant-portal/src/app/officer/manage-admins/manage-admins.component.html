<div class="container">

    <div class="top-bar">
        <h1>Hello Reviewer!</h1>
        <button class="back-btn" routerLink="/officer/dashboard"><i class="bi bi-arrow-left"></i> Back to Dashboard</button>
    </div>

    <div class="controls">
        <button class="add-btn" routerLink="/officer/register-admins">Add new admin</button>

        <div class="search-wrapper">
            <div class="search-box">
                <input type="text" placeholder="Search by Name" [(ngModel)]="pendingSearchTerm" (keyup.enter)="triggerSearch()">
            </div>
            <button class="search-btn" (click)="triggerSearch()" title="Search"><i class="bi bi-search"></i></button>
        </div>
    </div>

    <div *ngIf="isLoading" style="text-align: center; margin-top: 20px;">Loading users...</div>
    <div *ngIf="errorMsg" style="color: red; text-align: center; margin-top: 20px;">{{ errorMsg }}</div>

    <table *ngIf="!isLoading">
        <thead>
            <tr>
                <th>Name</th>
                <th>Email Address</th>
                <th>Current State</th>
                <th>Action</th>
            </tr>
        </thead>

        <tbody>
            <tr *ngFor="let admin of filteredAdmins">
                <td>{{ admin.username }}</td>
                <td>{{ admin.email }}</td>

                <td>
                    <span class="status-badge" [ngClass]="admin.status === 'Granted' ? 'status-approved' : 'status-rejected'">
                        {{ admin.status || 'Revoked' }}
                    </span>
                </td>

                <td>
                    <div class="action-buttons">
                        <button *ngIf="admin.status === 'Granted'" class="action-icon-btn revoke-icon" (click)="revokeAccess(admin.id)" title="Revoke Access">
                            <i class="bi bi-shield-x"></i>
                        </button>

                        <button *ngIf="admin.status !== 'Granted'" class="action-icon-btn grant-icon" (click)="grantAccess(admin.id)" title="Grant Access">
                            <i class="bi bi-shield-check"></i>
                        </button>

                        <button class="action-icon-btn delete-icon" (click)="deleteAdmin(admin.id)" title="Delete"><i class="bi bi-trash"></i></button>
                    </div>
                </td>
            </tr>

            <tr *ngIf="filteredAdmins.length === 0">
                <td colspan="4" style="text-align: center; color: #777;">No users found.</td>
            </tr>
        </tbody>
    </table>

</div>
