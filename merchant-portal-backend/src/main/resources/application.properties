# App name & port
spring.application.name=merchant-portal-backend
server.port=8080

# PostgreSQL connection (using default postgres user)
spring.datasource.url=jdbc:postgresql://localhost:5432/merchantdb
spring.datasource.username=postgres
spring.datasource.password=system

# JPA/Hibernate settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Allow Angular frontend to call backend
spring.web.cors.allowed-origin-patterns=http://localhost:4200
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS

# File upload limits
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=30MB

# SMTP4Dev mail configuration (smtp4dev default port is 25)
spring.mail.host=localhost
spring.mail.port=25
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false
spring.mail.from=no-reply@merchantportal.com

# JWT configuration
# Secret key used to sign and verify JWT tokens (min. 32 characters for HMAC-SHA256)
jwt.secret=mysecretkeymysecretkeymysecretkeymysecretkey
# Token validity duration in milliseconds ? 86400000ms = 24 hours
jwt.expiration=86400000

# Spring AI / Gemini configuration
spring.ai.google.genai.api-key=${GEMINI_API_KEY:}
spring.ai.google.genai.chat.options.model=gemini-2.0-flash
# NOTE: Do NOT select the chat model provider by default here. When
# `spring.ai.model.chat` is set to `google-genai` the Google GenAI
# auto-configuration will attempt to create a client and it will fail
# the ApplicationContext if no API key (GEMINI_API_KEY) or Vertex
# credentials are provided. Enable the provider in production by
# setting the property via an environment-specific file or an
# environment variable, for example:
#   -Dspring.ai.model.chat=google-genai
#   or
#   export SPRING_AI_MODEL_CHAT=google-genai
# Leaving it unset here keeps the app and tests runnable when the
# Gemini API key is not available locally.
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
